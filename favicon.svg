<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="PCA Ordination Study">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#0e0f14"/>
  <rect x="8" y="8" width="112" height="112" rx="18" fill="#161820" stroke="#c9a84c" stroke-width="4"/>

  <!-- Open book -->
  <g stroke="#c9a84c" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round" fill="#1b1d26">
    <!-- left page -->
    <path d="M64 36 C 54 30, 38 29, 30 32 L 30 92 C 38 89, 54 90, 64 96 Z"/>
    <!-- right page -->
    <path d="M64 36 C 74 30, 90 29, 98 32 L 98 92 C 90 89, 74 90, 64 96 Z"/>
  </g>
  <!-- spine -->
  <line x1="64" y1="36" x2="64" y2="96" stroke="#7a6030" stroke-width="2.4" stroke-linecap="round"/>

  <!-- text lines on pages -->
  <g stroke="#7a6030" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <line x1="37" y1="44" x2="57" y2="46"/>
    <line x1="37" y1="54" x2="57" y2="56"/>
    <line x1="71" y1="46" x2="91" y2="44"/>
    <line x1="71" y1="56" x2="91" y2="54"/>
  </g>

  <!-- cross rising from the book -->
  <g fill="#e8c97a">
    <rect x="61" y="52" width="6" height="34" rx="2"/>
    <rect x="52" y="61" width="24" height="6" rx="2"/>
  </g>
</svg>
